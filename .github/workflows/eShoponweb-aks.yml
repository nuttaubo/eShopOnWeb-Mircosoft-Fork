name: Container Workflow

on:
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: aistraining.azurecr.io
  TAG_NAME: eshoponweb-phanupong:1.0.0
  IMAGE_NAME: aistraining.azurecr.io/eshoponweb-phanupong:1.0.0

  RESOURCE_GROUP: ais-training
  CLUSTER_NAME: aks-demo

jobs:
  build-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -f src/Web/Dockerfile \
            -t ${{ env.IMAGE_NAME }} .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}

  deploy-to-aks:
    needs: build-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Create Image Pull Secret
        uses: azure/k8s-create-secret@v4
        with:
          container-registry-url: ${{ env.ACR_LOGIN_SERVER }}
          container-registry-username: ${{ secrets.ACR_USERNAME }}
          container-registry-password: ${{ secrets.ACR_PASSWORD }}
          secret-name: aks-secret

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v5
        with:
          manifests: |
            .k8s/deployment.yaml
            .k8s/service.yaml
          images: |
            ${{ env.IMAGE_NAME }}
          imagepullsecrets: |
            aks-secret
